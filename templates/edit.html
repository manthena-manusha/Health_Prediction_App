<!DOCTYPE html>
<html>

<head>
    <title>Edit Patient</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Edit Patient</h1>

<form action="/update/{{ patient[0] }}"
      method="POST">

<input type="text"
       name="full_name"
       value="{{ patient[1] }}"
       required>

<input type="date"
       name="dob"
       value="{{ patient[2] }}"
       required>

<input type="email"
       name="email"
       value="{{ patient[3] }}"
       required>

<input type="number"
       name="glucose"
       value="{{ patient[4] }}"
       required>

<input type="number"
       step="0.1"
       name="haemoglobin"
       value="{{ patient[5] }}"
       required>

<input type="number"
       name="cholesterol"
       value="{{ patient[6] }}"
       required>

<button type="submit">
Update Patient
</button>

</form>

<br>

<a href="/">Back to Home</a>

</div>

</body>
</html>
